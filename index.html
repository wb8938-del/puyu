<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>捕鱼达人 · 抖音直播版</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #000;
    overflow: hidden;
    width: 100%; height: 100%;
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
    user-select: none;
  }
  #game-container {
    width: 100%; height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
  }
  #game-container canvas { display: block; }

  /* ── 加载遮罩 ── */
  #loading-overlay {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, #001a3a 0%, #000510 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 9999; color: #fff;
    transition: opacity 0.8s ease;
  }
  #loading-overlay h1 {
    font-size: 2.5rem;
    background: linear-gradient(135deg, #00d4ff, #ff00ff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 1rem;
  }
  .loading-bar-wrap {
    width: 300px; height: 8px;
    background: rgba(255,255,255,.15); border-radius: 4px; overflow: hidden;
  }
  .loading-bar {
    height: 100%;
    background: linear-gradient(90deg, #00d4ff, #ff00ff);
    border-radius: 4px;
    animation: loadpulse 1.5s ease-in-out infinite;
  }
  @keyframes loadpulse { 0%{width:20%}50%{width:80%}100%{width:20%} }
  #loading-overlay p { margin-top: .8rem; color: rgba(255,255,255,.5); font-size: .9rem; }
  #loading-overlay .tip {
    margin-top: 1.5rem; color: rgba(255,255,255,.35); font-size: .75rem; text-align: center;
  }
</style>
</head>
<body>

<div id="loading-overlay">
  <h1>🎣 捕鱼达人</h1>
  <div class="loading-bar-wrap"><div class="loading-bar"></div></div>
  <p>正在初始化直播游戏环境…</p>
  <div class="tip">
    点击任意位置开启音效<br>
    观众刷礼物获得大炮 · 发弹幕输入坐标开炮
  </div>
</div>

<div id="game-container"></div>

<!-- PixiJS v8 & Tone.js -->
<script src="https://pixijs.download/v8.1.0/pixi.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

<!-- ★ 原游戏水波纹着色器（从原仓库复制 WaterFilter.js → 改名为 OriginalWaterFilter.js）-->
<!-- 如果文件不存在不影响运行，WaterBackground 会自动使用内置光效 -->
<script src="src/OriginalWaterFilter.js" onerror="console.log('原版着色器未加载，使用内置特效')"></script>

<!-- 游戏核心模块（加载顺序不可变）-->
<script src="src/Config.js"></script>
<script src="src/LiveBridge.js"></script>
<script src="src/AudioManager.js"></script>
<script src="src/WaterBackground.js"></script>
<script src="src/FishManager.js"></script>
<script src="src/FishFormation.js"></script>
<script src="src/RulerUI.js"></script>
<script src="src/ViewerCannon.js"></script>
<script src="src/ViewerCannonManager.js"></script>
<script src="src/ScorePanel.js"></script>
<script src="src/GiftNotification.js"></script>
<script src="src/ScreenEffects.js"></script>
<script src="src/LiveHUD.js"></script>
<script src="src/TikTokSDK.js"></script>
<script src="src/Main.js"></script>

</body>
</html>
