# Nginx 反向代理配置
# 文件路径：/etc/nginx/sites-available/fishing-joy
#
# 使用方式：
#   sudo ln -s /etc/nginx/sites-available/fishing-joy /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# HTTPS（推荐）：
#   sudo certbot --nginx -d your-domain.com

upstream fishing_game {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name your-domain.com;  # ← 改成你的域名

    # 强制 HTTPS（申请证书后取消注释）
    # return 301 https://$host$request_uri;

    # 静态文件缓存（游戏资源）
    location ~* \.(js|css|png|jpg|mp3|svg|ico|woff2)$ {
        proxy_pass http://fishing_game;
        proxy_cache_valid 200 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # WebSocket 代理
    location / {
        proxy_pass http://fishing_game;
        proxy_http_version 1.1;

        # WebSocket 必须头
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 真实 IP 透传
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 超时（观众长时间挂机不断开）
        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
        proxy_connect_timeout 75s;
    }

    # 管理后台访问限制（可选，限制 IP 访问）
    location /admin.html {
        # allow 123.123.123.123;   # ← 你的管理 IP
        # deny  all;
        proxy_pass http://fishing_game;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # 限制 API 访问频率（防刷）
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://fishing_game;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

